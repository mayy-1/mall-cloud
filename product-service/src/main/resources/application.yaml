server:
  port: 8082
spring:
  application:
    name: product-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/mall_product?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 241119
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
  data:
    redis:
      host: localhost
      port: 6379
      password: 241119
      database: 0
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
pagehelper:
  helper-dialect: mysql
  reasonable: true
# ========== 阿里云 OSS 对象存储 ==========
# 生产环境请在 Nacos (product-service-dev.yaml) 中覆盖真实值
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    accessKeyId: your-access-key-id
    accessKeySecret: your-access-key-secret
    bucketName: your-bucket-name
    dir:
      prefix: mall
    callback:

# ========== MinIO 对象存储 ==========
# 生产环境请在 Nacos (product-service-dev.yaml) 中覆盖真实值
minio:
  endpoint: http://localhost:9000
  bucketName: mall
  accessKey: minioadmin
  secretKey: minioadmin

# ========== Seata 分布式事务（部署 Seata Server 后设为 true） ==========
seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: mall-tx-group
  service:
    vgroup-mapping:
      mall-tx-group: default
    grouplist:
      default: localhost:8091
  config:
    type: file
  registry:
    type: file

management:
  endpoints:
    web:
      exposure:
        include: '*'
