# ================================
# Sa-Token 配置 — UUID 风格
# 所有服务共享 Redis，token 在 Redis 中存储和校验
# ================================
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位秒（30天）
  timeout: 2592000
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否共用同一个token
  is-share: false
  # 是否输出操作日志
  is-log: false
  # 是否从cookie中读取token
  is-read-cookie: false
  # 是否从head中读取token
  is-read-header: true
  # token前缀
  token-prefix: Bearer
  # 是否打印banner
  is-print: false

# ================================
# Redis 配置 — 用于 token 存储
# ================================
spring:
  data:
    redis:
      host: localhost
      database: 0
      port: 6379
      password: 241119

# ================================
# 日志配置
# ================================
logging:
  level:
    root: info
    com.mym.mall: debug
