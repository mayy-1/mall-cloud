server:
  port: 8201
spring:
  application:
    name: mall-gateway
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true #使用小写service-id
          routes: #配置路由路径
            # ========== 认证服务 ==========
            - id: mall-auth
              uri: lb://mall-auth
              predicates:
                - Path=/mall-auth/**
              filters:
                - StripPrefix=1

            # ========== 后台管理路由 (mall-admin-web 前端) ==========
            # 根据前端请求路径前缀，精准转发到各微服务
            # Controller 路径不变，仅网关路由层做拆分映射
            - id: admin-user-service
              uri: lb://user-service
              predicates:
                - Path=/mall-admin/admin/**,/mall-admin/role/**,/mall-admin/menu/**,/mall-admin/resource/**,/mall-admin/resourceCategory/**,/mall-admin/memberLevel/**
              filters:
                - StripPrefix=1
            - id: admin-product-service
              uri: lb://product-service
              predicates:
                - Path=/mall-admin/product/**,/mall-admin/brand/**,/mall-admin/productCategory/**,/mall-admin/sku/**,/mall-admin/productAttribute/**,/mall-admin/aliyun/**,/mall-admin/minio/**
              filters:
                - StripPrefix=1
            - id: admin-order-service
              uri: lb://order-service
              predicates:
                - Path=/mall-admin/order/**,/mall-admin/orderSetting/**,/mall-admin/returnApply/**,/mall-admin/returnReason/**,/mall-admin/companyAddress/**
              filters:
                - StripPrefix=1
            - id: admin-marketing-service
              uri: lb://marketing-service
              predicates:
                - Path=/mall-admin/coupon/**,/mall-admin/couponHistory/**,/mall-admin/flash/**,/mall-admin/flashSession/**,/mall-admin/flashProductRelation/**,/mall-admin/home/**,/mall-admin/prefrenceArea/**,/mall-admin/subject/**
              filters:
                - StripPrefix=1
            - id: admin-search-service
              uri: lb://search-service
              predicates:
                - Path=/mall-admin/esProduct/**
              filters:
                - StripPrefix=1

            # ========== 前台门户路由 (mall-app / H5 前端) ==========
            - id: portal-portal-service
              uri: lb://portal-service
              predicates:
                - Path=/mall-portal/home/**,/mall-portal/product/**,/mall-portal/brand/**
              filters:
                - StripPrefix=1
            - id: portal-member-service
              uri: lb://member-service
              predicates:
                - Path=/mall-portal/sso/**,/mall-portal/member/**
              filters:
                - StripPrefix=1
            - id: portal-trade-service
              uri: lb://trade-service
              predicates:
                - Path=/mall-portal/order/**,/mall-portal/alipay/**,/mall-portal/returnApply/**
              filters:
                - StripPrefix=1
            - id: portal-cart-service
              uri: lb://cart-service
              predicates:
                - Path=/mall-portal/cart/**
              filters:
                - StripPrefix=1
            - id: portal-seckill-service
              uri: lb://marketing-service
              predicates:
                - Path=/mall-portal/seckill/**
              filters:
                - StripPrefix=1

            # ========== 搜索服务 (独立路径) ==========
            - id: mall-search
              uri: lb://search-service
              predicates:
                - Path=/mall-search/**
              filters:
                - StripPrefix=1

            # ========== 秒杀快捷路径 ==========
            - id: mall-seckill
              uri: lb://marketing-service
              predicates:
                - Path=/mall-seckill/**
              filters:
                - StripPrefix=1
  data:
    redis:
      database: 0
      port: 6379
      host: localhost
      password: 241119
secure:
  ignore:
    urls: #配置白名单路径
      - "/doc.html"
      - "/v3/api-docs/swagger-config"
      - "/*/v3/api-docs/default"
      - "/*/v3/api-docs"
      - "/*/swagger-ui/**"
      - "/webjars/**"
      - "/favicon.ico"
      - "/webjars/**"
      - "/actuator/**"
      - "/mall-auth/**"
      - "/mall-search/**"
      - "/mall-portal/sso/login"
      - "/mall-portal/sso/register"
      - "/mall-portal/sso/getAuthCode"
      - "/mall-portal/home/**"
      - "/mall-portal/product/**"
      - "/mall-portal/brand/**"
      - "/mall-portal/alipay/**"
      - "/mall-admin/admin/login"
      - "/mall-admin/admin/register"
      - "/mall-admin/minio/upload"
management:
  endpoints:
    web:
      exposure:
        include: '*' #暴露Actuator的监控端点
  endpoint:
    health:
      show-details: always #显示健康的详细信息
    env:
      show-values: always #默认Actuator的环境变量会以****显示，这里开启显示
    configprops:
      show-values: always #默认Actuator的配置属性会以****显示，这里开启显示
    info:
      access: read-only
knife4j:
  gateway:
    enabled: true
    strategy: discover #网关文档聚合方式：服务发现（自动聚合）
    discover:
      version: openapi3 #配置OpenAPI3规范
      enabled: true #配置开启服务发现
      excluded-services: mall-monitor #排除监控服务
    tags-sorter: order #配置tag排序规则
    operations-sorter: order #配置operation排序规则
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位秒，-1代表永不过期
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期)，单位秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为false时每次登录新建一个token)
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false
  # 是否从cookie中读取token
  is-read-cookie: false
  # 是否从head中读取token
  is-read-header: true
  # token前缀
  token-prefix: Bearer
  # 是否打印banner
  is-print: false
