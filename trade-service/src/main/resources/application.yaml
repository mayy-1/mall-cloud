server:
  port: 8090
spring:
  application:
    name: trade-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/mall_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
pagehelper:
  helper-dialect: mysql
  reasonable: true
redis:
  key:
    orderId: order_id
  database: 0
# ========== Seata 分布式事务 ==========
seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: mall-tx-group
  service:
    vgroup-mapping:
      mall-tx-group: default
    grouplist:
      default: localhost:8091
  config:
    type: file
  registry:
    type: file
management:
  endpoints:
    web:
      exposure:
        include: '*'
