server:
  port: 8085
spring:
  application:
    name: member-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/mall_member?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 241119
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
  data:
    redis:
      host: localhost
      port: 6379
      password: 241119
      database: 0
    mongodb:
      host: localhost
      port: 27017
      database: mall_member
redis:
  database: mall
  expire:
    common: 86400
    authCode: 120
  key:
    member: member
    authCode: authCode
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
pagehelper:
  helper-dialect: mysql
  reasonable: true
sa-token:
  token-name: Authorization
  timeout: 2592000
  token-prefix: Bearer
# ========== Seata 分布式事务 ==========
seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: mall-tx-group
  service:
    vgroup-mapping:
      mall-tx-group: default
    grouplist:
      default: localhost:8091
  config:
    type: file
  registry:
    type: file
management:
  endpoints:
    web:
      exposure:
        include: '*'
